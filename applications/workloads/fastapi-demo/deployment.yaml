apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-demo
  namespace: fastapi-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-demo
  template:
    metadata:
      labels:
        app: fastapi-demo
    spec:
      containers:
        - name: fastapi
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              pip install --no-cache-dir fastapi uvicorn && \
              uvicorn main:app --host 0.0.0.0 --port 8000
          workingDir: /app
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: app
              mountPath: /app/main.py
              subPath: main.py
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: app
          configMap:
            name: fastapi-demo-app
