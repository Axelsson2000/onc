name: Build FastAPI Image

on:
  push:
    branches:
      - main
    paths:
      - "applications/workloads/fastapi/**"
      - ".github/workflows/fastapi-image.yaml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: applications/workloads/fastapi
          push: true
          tags: |
            ghcr.io/axelsson2000/onc-fastapi:main
            ghcr.io/axelsson2000/onc-fastapi:${{ github.sha }}
