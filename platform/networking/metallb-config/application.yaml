apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-networking-metallb-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://github.com/Axelsson2000/onc.git
    targetRevision: main
    path: platform/networking/metallb-config
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
