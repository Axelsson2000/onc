apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-observability-prometheus
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.3.0
      helm:
        valueFiles:
          - $values/platform/observability/prometheus/values.yaml

    - repoURL: https://github.com/Axelsson2000/onc.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
