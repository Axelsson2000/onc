architecture: standalone

image:
  registry: docker.io
  repository: bitnamisecure/valkey
  tag: 8.1.3-debian-12-r3

auth:
  enabled: false

primary:
  persistence:
    enabled: true
    storageClass: longhorn
    size: 4Gi

  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
