architecture: standalone

image:
  registry: docker.io
  repository: bitnami/valkey
  tag: latest

auth:
  enabled: false

primary:
  persistence:
    enabled: true
    storageClass: longhorn
    size: 4Gi

  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
