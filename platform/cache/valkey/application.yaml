apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-cache-valkey
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: valkey
      targetRevision: 3.0.31
      helm:
        valueFiles:
          - $values/platform/cache/valkey/values.yaml

    - repoURL: https://github.com/Axelsson2000/onc.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-cache

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
