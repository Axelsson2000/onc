apiVersion: v1
kind: Pod
metadata:
  name: storage-test
spec:
  containers:
    - name: alpine
      image: alpine:3.20
      command:
        - sleep
        - infinity
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: storage-test
